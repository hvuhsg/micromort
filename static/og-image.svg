<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <!-- Decorative bar chart -->
  <rect x="140" y="340" width="80" height="120" rx="6" fill="#334155" />
  <rect x="260" y="280" width="80" height="180" rx="6" fill="#475569" />
  <rect x="380" y="220" width="80" height="240" rx="6" fill="#2563eb" />
  <rect x="500" y="260" width="80" height="200" rx="6" fill="#475569" />
  <rect x="620" y="310" width="80" height="150" rx="6" fill="#334155" />
  <rect x="740" y="370" width="80" height="90" rx="6" fill="#334155" />
  <rect x="860" y="400" width="80" height="60" rx="6" fill="#334155" />
  <rect x="980" y="420" width="80" height="40" rx="6" fill="#334155" />
  <!-- "YOU" marker -->
  <text x="420" y="200" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#60a5fa" text-anchor="middle">YOU</text>
  <polygon points="414,208 426,208 420,218" fill="#60a5fa" />
  <!-- X axis -->
  <line x1="120" y1="462" x2="1080" y2="462" stroke="#475569" stroke-width="2" />
  <!-- Title -->
  <text x="600" y="100" font-family="system-ui, sans-serif" font-size="56" font-weight="bold" fill="white" text-anchor="middle">Micromort Calculator</text>
  <text x="600" y="150" font-family="system-ui, sans-serif" font-size="26" fill="#94a3b8" text-anchor="middle">What's your daily one-in-a-million chance of death?</text>
  <!-- Footer -->
  <text x="600" y="570" font-family="system-ui, sans-serif" font-size="20" fill="#64748b" text-anchor="middle">Based on public data from WHO, CDC, and actuarial tables</text>
  <rect x="140" y="590" width="920" height="3" rx="1.5" fill="#1e3a5f" />
</svg>
